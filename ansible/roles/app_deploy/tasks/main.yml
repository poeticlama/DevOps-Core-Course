---
# app_deploy role -- — pull and run the containerised Python app

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
    registry_url: https://index.docker.io/v1/
  no_log: true

- name: Pull latest Docker image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_image_tag }}"
    source: pull
    force_source: yes

- name: Stop existing container (if running)
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: stopped
  ignore_errors: yes

- name: Remove old container (if exists)
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent
  ignore_errors: yes

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: started
    restart_policy: "{{ app_restart_policy }}"
    ports:
      - "{{ app_port_host }}:{{ app_port_container }}"
    env: "{{ app_env_vars }}"
  notify: restart app container

- name: Wait for application port to be available
  wait_for:
    host: "127.0.0.1"
    port: "{{ app_port_host }}"
    delay: "{{ app_health_delay }}"
    timeout: "{{ app_health_timeout }}"
    state: started

- name: Verify application health endpoint
  uri:
    url: "http://127.0.0.1:{{ app_port_host }}{{ app_health_endpoint }}"
    method: GET
    status_code: 200
  register: health_result
  retries: 5
  delay: 3
  until: health_result.status == 200

- name: Display health check result
  debug:
    msg: "Health check passed — status: {{ health_result.json.status }}, uptime: {{ health_result.json.uptime_seconds }}s"


