---
# Docker role -- install and configure Docker Engine on Ubuntu

- name: Ensure keyrings directory exists
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker GPG key
  get_url:
    url: "{{ docker_gpg_key_url }}"
    dest: /tmp/docker.gpg
    mode: '0644'

- name: Dearmor Docker GPG key into keyrings
  shell: >
    gpg --dearmor < /tmp/docker.gpg > /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg

- name: Set permissions on Docker GPG key
  file:
    path: /etc/apt/keyrings/docker.gpg
    mode: '0644'

- name: Add Docker APT repository
  apt_repository:
    repo: "{{ docker_apt_repo }}"
    state: present
    filename: docker

- name: Update apt cache after adding Docker repo
  apt:
    update_cache: yes

- name: Install Docker packages
  apt:
    name: "{{ docker_packages }}"
    state: present
  notify: restart docker

- name: Ensure Docker service is started and enabled
  service:
    name: docker
    state: "{{ docker_service_state }}"
    enabled: "{{ docker_service_enabled }}"

- name: Add user to the docker group
  user:
    name: "{{ docker_user }}"
    groups: docker
    append: yes

- name: Install python3-docker for Ansible Docker modules
  apt:
    name: python3-docker
    state: present


