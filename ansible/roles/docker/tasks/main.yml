---
# Docker role -- install and configure Docker Engine on Ubuntu
# Refactored with blocks and tags for better organization and error handling

- name: Docker installation block
  block:
    - name: Ensure keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker GPG key
      get_url:
        url: "{{ docker_gpg_key_url }}"
        dest: /tmp/docker.gpg
        mode: '0644'

    - name: Dearmor Docker GPG key into keyrings
      shell: >
        gpg --dearmor < /tmp/docker.gpg > /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set permissions on Docker GPG key
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Add Docker APT repository
      apt_repository:
        repo: "{{ docker_apt_repo }}"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: yes

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present
      notify: restart docker

  rescue:
    - name: Wait before retrying Docker repo setup
      wait_for:
        timeout: 10
      delegate_to: localhost

    - name: Retry Docker APT repository addition
      apt_repository:
        repo: "{{ docker_apt_repo }}"
        state: present
        filename: docker

    - name: Retry apt cache update
      apt:
        update_cache: yes

    - name: Log Docker installation retry
      debug:
        msg: "Docker installation failed on first attempt, retried after 10 second wait"

  always:
    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: "{{ docker_service_state }}"
        enabled: "{{ docker_service_enabled }}"

    - name: Log Docker installation block completion
      copy:
        content: |
          Docker installation completed at {{ ansible_date_time.iso8601 }}
          Status: Success
          Service State: {{ docker_service_state }}
        dest: /tmp/docker_install_log.txt

  tags:
    - docker_install
    - docker

- name: Docker configuration block
  block:
    - name: Add user to the docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes

    - name: Install python3-docker for Ansible Docker modules
      apt:
        name: python3-docker
        state: present

    - name: Install docker-compose via pip
      pip:
        name: docker-compose
        state: present

  always:
    - name: Ensure Docker service is enabled
      service:
        name: docker
        enabled: "{{ docker_service_enabled }}"

  tags:
    - docker_config
    - docker


