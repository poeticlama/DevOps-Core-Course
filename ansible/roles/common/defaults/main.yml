---
# Default variables for the common role

# Packages to install on every managed host
common_packages:
  - python3-pip
  - curl
  - wget
  - git
  - vim
  - htop
  - net-tools
  - unzip
  - ca-certificates
  - gnupg
  - lsb-release
  - apt-transport-https

# Timezone for the server
common_timezone: "UTC"

# APT cache valid time in seconds (1 hour)
apt_cache_valid_time: 3600

