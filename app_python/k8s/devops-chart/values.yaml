# Default values for devops-info-service Helm chart

# Replica count for the deployment
replicaCount: 3

# Image configuration
image:
  repository: poeticlama/devops-info-service
  tag: "1.0"
  pullPolicy: IfNotPresent

# Service configuration
service:
  type: NodePort
  port: 80
  targetPort: 8080
  nodePort: 30080

# Resource limits and requests
resources:
  limits:
    cpu: 200m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Liveness probe configuration
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

# Readiness probe configuration
readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 3
  timeoutSeconds: 1
  failureThreshold: 2

# Pod security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Rolling update strategy
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Namespace
namespace: default

# Labels for all resources
labels:
  tier: application
  component: service

# Secrets configuration
secrets:
  enabled: true
  credentials:
    username: "app_admin"
    password: "changeme123"
    api_key: "default-api-key"
    database_url: "postgresql://localhost:5432/appdb"

# Vault configuration for Agent Injection
vault:
  enabled: false
  role: "devops-app"
  secretPath: "secret/data/devops-app"

# Application configuration
config:
  appName: "DevOps Info Service"
  environment: "production"
  logLevel: "INFO"
  metricsEnabled: true

# Persistence configuration for visits counter
persistence:
  enabled: true
  size: 1Gi
  storageClass: null  # Use default storage class if null


