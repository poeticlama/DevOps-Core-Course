apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "devops-chart.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devops-chart.labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}

spec:
  serviceName: {{ include "devops-chart.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      {{- include "devops-chart.selectorLabels" . | nindent 6 }}

  template:
    metadata:
      labels:
        {{- include "devops-chart.selectorLabels" . | nindent 8 }}
        version: {{ .Chart.AppVersion | quote }}
      annotations:
        description: "DevOps Info Service StatefulSet"
        {{- if .Values.vault.enabled }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-config: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/agent-inject-template-config: |
          {{- include "devops-chart.vaultTemplate" . | nindent 10 }}
        {{- end }}

    spec:
      serviceAccountName: default
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}

      volumes:
      - name: config
        configMap:
          name: {{ include "devops-chart.fullname" . }}-config

      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP

        envFrom:
        - configMapRef:
            name: {{ include "devops-chart.fullname" . }}-env
        {{- if .Values.secrets.enabled }}
        - secretRef:
            name: {{ include "devops-chart.fullname" . }}-credentials
        {{- end }}

        volumeMounts:
        - name: config
          mountPath: /etc/config
        - name: data
          mountPath: /data

        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}

        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}

        resources:
          {{- toYaml .Values.resources | nindent 10 }}

  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      {{- if .Values.persistence.storageClass }}
      storageClassName: {{ .Values.persistence.storageClass }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.persistence.size }}

