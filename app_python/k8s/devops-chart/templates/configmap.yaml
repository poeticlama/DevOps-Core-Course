apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-chart.fullname" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devops-chart.labels" . | nindent 4 }}
data:
  config.json: |-
{{ .Files.Get "files/config.json" | indent 4 }}

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "devops-chart.fullname" . }}-env
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devops-chart.labels" . | nindent 4 }}
data:
  APP_NAME: "{{ .Values.config.appName }}"
  APP_ENV: "{{ .Values.config.environment }}"
  LOG_LEVEL: "{{ .Values.config.logLevel }}"
  METRICS_ENABLED: "{{ .Values.config.metricsEnabled }}"
  VISITS_FILE_PATH: "/data/visits"

