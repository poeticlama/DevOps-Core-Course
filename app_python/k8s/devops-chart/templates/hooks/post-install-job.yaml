apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-chart.fullname" . }}-post-install"
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "devops-chart.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded

spec:
  template:
    metadata:
      name: "{{ include "devops-chart.fullname" . }}-post-install"
      labels:
        {{- include "devops-chart.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: post-install-job
        image: busybox:latest
        command:
          - sh
          - -c
          - |
            echo "=== Post-install Hook Execution ==="
            echo "Starting post-installation smoke tests..."
            echo "Timestamp: $(date)"
            sleep 5
            echo "Smoke test: Verifying service deployment"
            echo "Deployment name: {{ include "devops-chart.fullname" . }}"
            sleep 3
            echo "Post-installation smoke tests completed successfully"
            exit 0

