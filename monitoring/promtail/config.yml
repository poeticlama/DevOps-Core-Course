server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Extract container name
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
        regex: '/?(.+)'
        replacement: '$1'

      # Extract container image name
      - source_labels: ['__meta_docker_container_image_name']
        target_label: 'image'

      # Extract container image tag
      - source_labels: ['__meta_docker_container_image_tag']
        target_label: 'tag'

      # Extract app label
      - source_labels: ['__meta_docker_container_label_app']
        target_label: 'app'

      # Extract job from logging label
      - source_labels: ['__meta_docker_container_label_logging']
        target_label: 'job'
        regex: 'promtail'

    # Filter to only containers with logging label
    pipeline_stages:
      - docker: {}

